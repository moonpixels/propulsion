name: Setup Project
description: 'Initialize the project with Bun dependencies'

runs:
    using: composite
    steps:
        - name: Setup Bun
          uses: oven-sh/setup-bun@v2
          with:
              bun-version: 1.3.11

        - name: Cache Bun dependencies
          uses: actions/cache@v5
          with:
              path: |
                  node_modules
                  ~/.bun/install/cache
              key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
              restore-keys: ${{ runner.os }}-bun-

        - name: Install Bun dependencies
          run: bun ci
          shell: bash
